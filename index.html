<!doctype html>
<html lang="en" data-theme="bauhaus">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f4edda">
<title>Todada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Caveat:wght@600;700&family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600&family=Jost:wght@500;600;700;800&family=Oswald:wght@500;600;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css?v=4">
<link rel="stylesheet" href="css/theme-basquiat.css?v=4">
<link rel="stylesheet" href="css/theme-bauhaus.css?v=4">
<link rel="stylesheet" href="css/theme-brutalist.css?v=4">
<link rel="stylesheet" href="css/theme-kandinsky.css?v=4">
<link rel="stylesheet" href="css/theme-mondrian.css?v=4">
<link rel="stylesheet" href="css/theme-pollock.css?v=4">
</head>
<body>

<!-- SVG filters used by themes (Basquiat hand-drawn wobble) -->
<svg class="svg-defs" width="0" height="0" aria-hidden="true" focusable="false">
  <filter id="wobble" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.012 0.03" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4"/>
  </filter>
  <filter id="wobble-strong" x="-8%" y="-8%" width="116%" height="116%">
    <feTurbulence type="fractalNoise" baseFrequency="0.02 0.04" numOctaves="2" seed="3" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="6"/>
  </filter>
</svg>

<div class="bg" aria-hidden="true"></div>

<div class="app">
  <header class="topbar">
    <button class="icon-btn" id="menuBtn" aria-label="Menu" aria-haspopup="dialog">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <button class="icon-btn" id="themeBtn" aria-label="Switch theme" aria-haspopup="dialog">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><circle cx="5" cy="12" r="2.1"/><circle cx="12" cy="12" r="2.1"/><circle cx="19" cy="12" r="2.1"/></svg>
    </button>
  </header>

  <h1 class="title">Todada</h1>

  <nav class="tabs" id="tabs" aria-label="Filter tasks">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="today">Today</button>
    <button class="tab" data-filter="upcoming">Upcoming</button>
    <button class="tab" data-filter="completed">Completed</button>
  </nav>

  <main class="content">
    <ul class="list" id="list"></ul>
    <p class="empty" id="empty" hidden></p>
  </main>

  <button class="fab" id="fab" aria-label="Add task">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 4v16M4 12h16"/></svg>
  </button>

  <nav class="bottomnav" aria-label="Views">
    <div class="bottomnav-inner">
      <button class="navitem active" data-view="tasks">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M8.5 12.2l2.4 2.4 4.6-5"/></svg>
        <span>Tasks</span>
      </button>
      <button class="navitem" data-view="calendar">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2"/><path d="M3.5 9.5h17M8 2.8V6.4M16 2.8V6.4"/><path d="M7.5 13h.01M12 13h.01M16.5 13h.01M7.5 16.8h.01M12 16.8h.01"/></svg>
        <span>Calendar</span>
      </button>
      <button class="navitem" data-view="tags">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.8 11.5V5.2c0-.8.6-1.4 1.4-1.4h6.3c.4 0 .7.1 1 .4l7.3 7.3c.6.6.6 1.5 0 2l-6.5 6.5c-.6.6-1.5.6-2 0l-7.1-7.1a1.4 1.4 0 0 1-.4-1.4z"/><circle cx="8.6" cy="8.6" r="1.3"/></svg>
        <span>Tags</span>
      </button>
    </div>
  </nav>
</div>

<div class="backdrop" id="backdrop" hidden></div>

<section class="sheet" id="taskSheet" role="dialog" aria-modal="true" aria-labelledby="taskSheetTitle">
  <form id="taskForm">
    <h2 class="sheet-title" id="taskSheetTitle">New task</h2>
    <input class="field" id="fTitle" name="title" type="text" placeholder="What needs doing?" autocomplete="off" required maxlength="120">
    <div class="chips" role="radiogroup" aria-label="Tag">
      <label class="chip"><input type="radio" name="tag" value="work" checked><i class="dot" data-tag="work"></i>Work</label>
      <label class="chip"><input type="radio" name="tag" value="personal"><i class="dot" data-tag="personal"></i>Personal</label>
      <label class="chip"><input type="radio" name="tag" value="health"><i class="dot" data-tag="health"></i>Health</label>
    </div>
    <input class="field" id="fDue" name="due" type="date" aria-label="Due date">
    <div class="sheet-row">
      <button type="button" class="btn danger" id="fDelete" hidden>Delete</button>
      <button type="submit" class="btn primary" id="fSave">Save</button>
    </div>
  </form>
</section>

<section class="sheet" id="themeSheet" role="dialog" aria-modal="true" aria-labelledby="themeSheetTitle">
  <h2 class="sheet-title" id="themeSheetTitle">Theme</h2>
  <div class="theme-grid" id="themeGrid">
    <button class="theme-pick" data-pick="basquiat"><span class="sw"><i style="background:#f0b31c"></i><i style="background:#cf1f3f"></i><i style="background:#12100d"></i></span>Basquiat</button>
    <button class="theme-pick" data-pick="bauhaus"><span class="sw"><i style="background:#f4edda"></i><i style="background:#d92818"></i><i style="background:#1740c8"></i></span>Bauhaus</button>
    <button class="theme-pick" data-pick="brutalist"><span class="sw"><i style="background:#d9d7d0"></i><i style="background:#161616"></i><i style="background:#ff4d00"></i></span>Brutalist</button>
    <button class="theme-pick" data-pick="kandinsky"><span class="sw"><i style="background:#f3ecdd"></i><i style="background:#d15a28"></i><i style="background:#1d2b50"></i></span>Kandinsky</button>
    <button class="theme-pick" data-pick="mondrian"><span class="sw"><i style="background:#f5f5f2"></i><i style="background:#dd0e0e"></i><i style="background:#ffd400"></i></span>Mondrian</button>
    <button class="theme-pick" data-pick="pollock"><span class="sw"><i style="background:#ece4cf"></i><i style="background:#d7442c"></i><i style="background:#17150f"></i></span>Pollock</button>
  </div>
</section>

<section class="sheet" id="menuSheet" role="dialog" aria-modal="true" aria-labelledby="menuSheetTitle">
  <h2 class="sheet-title" id="menuSheetTitle">Menu</h2>
  <div class="menu-list">
    <button class="btn ghost" id="clearDone">Clear completed</button>
    <button class="btn ghost" id="restoreSamples">Restore sample tasks</button>
  </div>
</section>

<script src="js/app.js?v=4"></script>
<script async data-id="101502386" src="//static.getclicky.com/js"></script>
</body>
</html>
