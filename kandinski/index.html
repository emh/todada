<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f3ecdd" />
  <title>Kandinski / Todo — Todada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=1" />
</head>
<body>

  <!-- The composition. Each shape is a task. -->
  <div class="stage" id="stage">
    <div class="rings" id="rings"></div>
    <div class="marks" id="marks"></div>
    <canvas class="scratch" id="scratch"></canvas>
    <div class="hint" id="hint" hidden>
      <p>This is not a list.<br/>It is a composition.</p>
      <p class="hint-sub">Tap for a point. Drag to create a shape.</p>
    </div>
  </div>

  <header class="topbar">
    <h1 class="day-title">Today</h1>
    <span class="day-date" id="dayDate"></span>
  </header>

  <nav class="bottombar" id="bottombar">
    <button class="bar-btn" id="layersBtn" aria-label="Layers">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3 21 8l-9 5-9-5z"/><path d="M3 13l9 5 9-5"/></svg>
      <span>Layers</span>
    </button>
    <button class="bar-btn" id="focusBtn" aria-label="Focus">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2.6" fill="currentColor" stroke="none"/></svg>
      <span>Focus</span>
    </button>
    <button class="bar-btn add-btn" id="addBtn" aria-label="Add a task">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="bar-btn" id="balanceBtn" aria-label="Balance">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 3v18M3 12h18"/><circle cx="12" cy="12" r="5.5"/></svg>
      <span>Balance</span>
    </button>
    <button class="bar-btn" id="viewBtn" aria-label="View">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="8" cy="9" r="3.4"/><rect x="13.5" y="6" width="6.5" height="6.5" rx="0.5"/><path d="M5 18.5h14"/></svg>
      <span>View</span>
    </button>
  </nav>

  <button class="lasso-fab" id="lassoBtn" aria-label="Lasso to group">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="3.4 3"><ellipse cx="12" cy="12" rx="8.5" ry="7"/></svg>
  </button>
  <div class="mode-hint" id="lassoHint" hidden>Circle the elements that belong together.</div>

  <!-- name & intent sheet -->
  <div class="backdrop" id="backdrop" hidden></div>
  <section class="sheet" id="nameSheet" hidden>
    <input class="name-input" id="nameInput" type="text" placeholder="Name it. Give it meaning." maxlength="60" autocomplete="off" />
    <div class="pick-row" id="shapeRow" role="radiogroup" aria-label="Shape — type of work"></div>
    <div class="pick-row color-picks" id="colorRow" role="radiogroup" aria-label="Color — context"></div>
    <div class="sheet-actions">
      <button class="ghost-btn" id="nameCancel">Let it go</button>
      <button class="solid-btn" id="nameDone">Place it</button>
    </div>
  </section>

  <!-- inspect sheet -->
  <section class="sheet" id="inspect" hidden></section>

  <!-- layers sheet -->
  <section class="sheet" id="layersSheet" hidden>
    <div class="sheet-head">
      <h2>Layers</h2>
      <button class="sheet-x" data-close aria-label="Close">✕</button>
    </div>
    <ul class="layer-list" id="layerList"></ul>
    <p class="sheet-note">Each layer is a different composition.</p>
  </section>

  <!-- view sheet: daily palette, notices, symbol guide -->
  <section class="sheet" id="viewSheet" hidden>
    <div class="sheet-head">
      <h2>The Day</h2>
      <button class="sheet-x" data-close aria-label="Close">✕</button>
    </div>
    <h3 class="sheet-sub">What kind of day?</h3>
    <div class="tone-grid" id="toneGrid"></div>
    <h3 class="sheet-sub">Notices</h3>
    <ul class="notices" id="notices"></ul>
    <h3 class="sheet-sub">The language</h3>
    <div class="legend" id="legend"></div>
  </section>

  <!-- balance overlay -->
  <div class="balance-veil" id="balanceVeil" hidden>
    <svg class="balance-svg" id="balanceSvg"></svg>
    <div class="balance-card">
      <p id="balanceVerdict"></p>
      <div class="sheet-actions">
        <button class="ghost-btn" id="balanceClose">Leave it</button>
        <button class="solid-btn" id="harmonize">Harmonize</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden>
    <span id="toastText"></span>
    <button id="toastAction" hidden></button>
  </div>

  <script src="app.js?v=1"></script>
</body>
</html>
