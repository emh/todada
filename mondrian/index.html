<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f3ec" />
  <title>Mondrian / Todo — Todada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

  <header class="topbar">
    <button class="top-btn" id="layersBtn" aria-label="Layers">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
    <h1 class="layer-title" id="layerTitle">Today</h1>
    <div class="top-right">
      <button class="top-btn" id="splitBtn" aria-label="Add a task — split a block">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="top-btn" id="menuBtn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
      </button>
    </div>
  </header>

  <!-- The composition: every rectangle is a task -->
  <main class="frame" id="frame">
    <div class="grid" id="grid"></div>
    <div class="mode-hint" id="splitHint" hidden>Tap a block to divide its space.</div>
  </main>

  <!-- drag ghost while rearranging -->
  <div class="drag-ghost" id="dragGhost" hidden></div>

  <!-- name card -->
  <div class="backdrop" id="backdrop" hidden></div>
  <section class="card" id="nameCard" hidden>
    <h2 id="nameCardTitle">New Task</h2>
    <input id="nameInput" type="text" placeholder="What is it?" maxlength="60" autocomplete="off" />
    <p class="card-label">Category</p>
    <div class="cat-row" id="catRow"></div>
    <div class="card-actions">
      <button class="btn-plain" id="nameCancel">Cancel</button>
      <button class="btn-solid" id="nameSave">Save</button>
    </div>
  </section>

  <!-- inspect card -->
  <section class="card" id="inspect" hidden></section>

  <!-- layers card -->
  <section class="card" id="layersCard" hidden>
    <div class="card-head">
      <h2>Layers</h2>
      <button class="card-x" data-close aria-label="Close">✕</button>
    </div>
    <ul class="layer-list" id="layerList"></ul>
    <p class="card-note">Each layer has its own composition.</p>
  </section>

  <!-- menu card: daily structure + notices -->
  <section class="card" id="menuCard" hidden>
    <div class="card-head">
      <h2>Choose Your Day</h2>
      <button class="card-x" data-close aria-label="Close">✕</button>
    </div>
    <div class="structs" id="structs"></div>
    <p class="card-label">Notices</p>
    <ul class="notices" id="notices"></ul>
    <button class="btn-line" id="clearDone">Clear completed into open space</button>
  </section>

  <div class="toast" id="toast" hidden>
    <span id="toastText"></span>
    <button id="toastAction" hidden></button>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
